<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SecureVault Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #071022;
            --surface: rgba(11, 19, 38, 0.84);
            --border: rgba(112, 144, 218, 0.25);
            --accent: #6aa8ff;
            --gold: #e7b551;
            --danger: #ff6c7d;
            --success: #43d083;
            --text: #e7f0ff;
            --text-muted: #95a5c7;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            min-height: 100vh;
            background: radial-gradient(circle at 17% 16%, rgba(87, 126, 231, 0.14), transparent 35%),
                radial-gradient(circle at 90% 82%, rgba(231, 181, 81, 0.08), transparent 32%),
                var(--bg);
            color: var(--text);
            font-family: "DM Sans", sans-serif;
        }

        .shell {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            animation: fadeUp 450ms ease;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(14px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .navbar {
            background: rgba(6, 12, 24, 0.95);
            border-bottom: 1px solid var(--border);
            padding: 14px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
        }

        .logo {
            font-family: "Syne", sans-serif;
            font-size: 26px;
            font-weight: 800;
        }

        .welcome-strip {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            border: 1px solid var(--border);
            background: var(--surface);
            border-radius: 14px;
            padding: 14px;
            margin-bottom: 14px;
        }

        .main {
            padding: 20px;
        }

        .welcome h2 {
            font-family: "Syne", sans-serif;
            font-size: 23px;
        }

        .welcome p {
            margin-top: 3px;
            color: var(--text-muted);
            font-size: 13px;
        }

        .actions { display: flex; gap: 8px; }

        .btn {
            border: 1px solid var(--border);
            background: rgba(11, 17, 32, 0.9);
            color: var(--text);
            padding: 9px 12px;
            border-radius: 9px;
            cursor: pointer;
            transition: transform 170ms ease;
        }

        .btn:hover { transform: translateY(-2px); }
        .btn.danger { border-color: rgba(255, 112, 128, 0.4); color: #ff9fa9; }

        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin: 14px 0;
        }

        .stat {
            border: 1px solid var(--border);
            border-radius: 12px;
            background: var(--surface);
            padding: 12px;
        }

        .stat .label {
            color: var(--text-muted);
            font-size: 12px;
            font-family: "DM Mono", monospace;
        }

        .stat .value {
            margin-top: 8px;
            font-family: "Syne", sans-serif;
            font-size: 20px;
        }

        .info-banner {
            border: 1px solid var(--border);
            background: rgba(14, 24, 47, 0.84);
            border-radius: 11px;
            padding: 10px 12px;
            color: var(--text-muted);
            margin-bottom: 12px;
        }

        .panel {
            border: 1px solid var(--border);
            border-radius: 14px;
            background: var(--surface);
            padding: 14px;
            margin-bottom: 12px;
        }

        .panel-head {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 8px;
            margin-bottom: 10px;
        }

        .panel-tools {
            display: flex;
            align-items: center;
            gap: 8px;
            width: min(100%, 560px);
        }

        .panel-tools .search {
            max-width: none;
        }

        .panel h3 {
            font-family: "Syne", sans-serif;
            font-size: 20px;
        }

        .search {
            max-width: 260px;
            width: 100%;
            border: 1px solid var(--border);
            border-radius: 9px;
            background: rgba(9, 15, 30, 0.85);
            color: var(--text);
            padding: 9px;
            outline: none;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            border-bottom: 1px solid rgba(120, 144, 193, 0.17);
            padding: 10px;
            text-align: left;
            font-size: 14px;
        }

        th {
            color: #b9cbef;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            font-family: "DM Mono", monospace;
        }

        .chip {
            display: inline-block;
            padding: 5px 8px;
            border-radius: 999px;
            font-family: "DM Mono", monospace;
            font-size: 12px;
        }

        .chip.user {
            border: 1px solid rgba(67, 208, 131, 0.55);
            background: rgba(41, 132, 84, 0.24);
            color: #7af1b0;
        }

        .chip.admin {
            border: 1px solid rgba(231, 181, 81, 0.5);
            background: rgba(97, 74, 19, 0.35);
            color: #f7ce78;
        }

        .skeleton-row {
            height: 34px;
            border-radius: 8px;
            background: linear-gradient(90deg, rgba(104, 128, 177, 0.16), rgba(141, 168, 223, 0.32), rgba(104, 128, 177, 0.16));
            background-size: 180% 100%;
            animation: shimmer 1.1s infinite;
            margin-bottom: 8px;
        }

        @keyframes shimmer {
            0% { background-position: 180% 0; }
            100% { background-position: -40% 0; }
        }

        .req-list {
            display: grid;
            gap: 8px;
        }

        .request-form {
            border: 1px solid var(--border);
            border-radius: 10px;
            background: rgba(8, 14, 28, 0.72);
            padding: 10px;
            margin-bottom: 10px;
        }

        .request-grid {
            display: grid;
            grid-template-columns: 1fr 1fr auto;
            gap: 8px;
            align-items: center;
        }

        .request-input {
            width: 100%;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: rgba(9, 15, 30, 0.9);
            color: var(--text);
            padding: 8px;
            outline: none;
        }

        .request-caption {
            margin-top: 8px;
            color: var(--text-muted);
            font-size: 12px;
            font-family: "DM Mono", monospace;
        }

        .req-item {
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 8px;
            background: rgba(9, 15, 30, 0.8);
        }

        .mini {
            padding: 6px 10px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: rgba(9, 16, 31, 0.86);
            color: var(--text);
            cursor: pointer;
            font-size: 12px;
        }

        .mini.accept { border-color: rgba(67, 208, 131, 0.42); color: #9cf6c5; }
        .mini.reject { border-color: rgba(255, 108, 125, 0.45); color: #ff9ca9; }

        .toast {
            position: fixed;
            top: 16px;
            right: 16px;
            border-radius: 10px;
            padding: 10px 14px;
            border: 1px solid var(--border);
            background: rgba(10, 17, 30, 0.95);
            color: var(--text);
            font-size: 13px;
            transform: translateX(120%);
            transition: transform 240ms ease;
            z-index: 5;
        }

        .toast.show { transform: translateX(0); }
        .toast.error { border-color: rgba(255, 108, 125, 0.48); }
        .toast.success { border-color: rgba(67, 208, 131, 0.45); }

        @media (max-width: 980px) {
            .navbar { padding: 12px 14px; }
            .welcome-strip { flex-direction: column; align-items: stretch; }
            .stats { grid-template-columns: 1fr; }
            .panel-head { flex-direction: column; align-items: stretch; }
            .panel-tools { width: 100%; flex-direction: column; }
            .search { max-width: none; }
            .request-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="shell">
        <header class="navbar">
            <div class="logo">SecureVault</div>
            <div class="actions">
                <button class="btn danger" onclick="logout()">Logout</button>
            </div>
        </header>

        <main class="main">
            <div class="welcome-strip">
                <div class="welcome">
                    <h2 id="welcomeText">Welcome</h2>
                    <p id="roleNote">Role chip</p>
                </div>
                <div class="actions">
                    <button class="btn" onclick="refreshDashboard()">Refresh</button>
                </div>
            </div>

            <section class="stats" id="statsSection"></section>

            <div class="info-banner" id="modeMessage"></div>

            <section class="panel" id="requestPanel" style="display:none;"></section>

            <section class="panel">
                <div class="panel-head">
                    <h3 id="tableTitle">Records</h3>
                    <div class="panel-tools">
                        <button id="addDataBtn" class="btn" type="button" onclick="promptAddData()" style="display:none;">+ Add Data</button>
                        <input id="searchBar" class="search" type="text" placeholder="Search by name, aadhaar, bank">
                    </div>
                </div>

                <div id="loader"></div>

                <table>
                    <thead id="tableHead">
                        <tr>
                            <th>S.No</th>
                            <th>Name</th>
                            <th>Number</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="dataBody"></tbody>
                </table>
            </section>
        </main>
    </div>

    <div class="toast" id="toast"></div>

    <script src="config.js"></script>
    <script>
        // API_BASE is loaded from config.js
        const role = localStorage.getItem("role");
        const username = localStorage.getItem("username");
        const userId = localStorage.getItem("userId");
        const adminId = localStorage.getItem("adminId");
        const companyName = localStorage.getItem("companyName");
        let allRows = [];
        let adminUsersCache = [];

        if (!role || !username) {
            window.location.href = "auth.html";
        }

        function showToast(message, type) {
            const toast = document.getElementById("toast");
            toast.textContent = message;
            toast.className = `toast ${type || ""} show`;
            setTimeout(() => toast.classList.remove("show"), 2400);
        }

        function showSkeleton() {
            const loader = document.getElementById("loader");
            loader.innerHTML = "";
            for (let i = 0; i < 4; i += 1) {
                const row = document.createElement("div");
                row.className = "skeleton-row";
                loader.appendChild(row);
            }
        }

        function hideSkeleton() {
            document.getElementById("loader").innerHTML = "";
        }

        function logout() {
            localStorage.clear();
            window.location.href = "user_login.html";
        }

        function setHeader() {
            document.getElementById("welcomeText").textContent = `Welcome, ${username}`;
            document.getElementById("roleNote").textContent = role === "ADMIN"
                ? `Role: ADMIN | ${companyName || "Organization"}`
                : "Role: USER";
        }

        function renderStats(totalRecords) {
            const stats = document.getElementById("statsSection");
            if (role === "ADMIN") {
                stats.innerHTML = `
                    <div class="stat"><div class="label">Total Users</div><div class="value">${totalRecords}</div></div>
                    <div class="stat"><div class="label">Access Level</div><div class="value">Restricted View</div></div>
                    <div class="stat"><div class="label">Masking</div><div class="value">Active</div></div>
                `;
            } else {
                stats.innerHTML = `
                    <div class="stat"><div class="label">Your Record</div><div class="value">${totalRecords}</div></div>
                    <div class="stat"><div class="label">Data Status</div><div class="value">Fully Visible</div></div>
                    <div class="stat"><div class="label">Security</div><div class="value">Active</div></div>
                `;
            }
        }

        function renderTable(rows) {
            const body = document.getElementById("dataBody");
            if (!rows.length) {
                const colspan = role === "ADMIN" ? 5 : 4;
                body.innerHTML = `<tr><td colspan='${colspan}' style='color:var(--text-muted);padding:14px;'>No records available for current access.</td></tr>`;
                return;
            }

            body.innerHTML = rows.map((r, index) => {
                // Get the document number (could be aadhaar or bankAccount)
                let displayValue = r.aadhaar || r.bankAccount || "";
                
                // Get document type - if not set, try to infer from the data
                let docName = r.documentType;
                if (!docName) {
                    // For old data without documentType, infer from the stored data
                    if (displayValue && displayValue.includes(":")) {
                        docName = displayValue.split(":")[0].trim();
                    } else if (displayValue) {
                        docName = r.aadhaar ? "Aadhaar" : (r.bankAccount ? "Bank Account" : "Document");
                    } else {
                        docName = "Document";
                    }
                }
                
                // Get the username
                let username = r.username || "N/A";
                
                // For admin, mask the sensitive data showing only last 4 digits
                if (role === "ADMIN" && displayValue && displayValue !== "--") {
                    displayValue = maskSensitiveData(displayValue);
                }
                
                // For admin, show User and Document separately
                if (role === "ADMIN") {
                    return `
                        <tr>
                            <td>${index + 1}</td>
                            <td>${escapeHtml(username)}</td>
                            <td>${escapeHtml(docName)}</td>
                            <td><span class="chip">${escapeHtml(displayValue)}</span></td>
                            <td><button class="mini reject" onclick="deleteRecord(${index})" style="cursor:pointer;">Delete</button></td>
                        </tr>
                    `;
                } else {
                    // For users, show Document in second column
                    return `
                        <tr>
                            <td>${index + 1}</td>
                            <td>${escapeHtml(docName)}</td>
                            <td><span class="chip">${escapeHtml(displayValue)}</span></td>
                            <td><button class="mini reject" onclick="deleteRecord(${index})" style="cursor:pointer;">Delete</button></td>
                        </tr>
                    `;
                }
            }).join("");
        }

        function deleteRecord(index) {
            if (!confirm("Are you sure you want to delete this record?")) {
                return;
            }
            allRows.splice(index, 1);
            document.getElementById("searchBar").value = "";
            renderTable(allRows);
            renderStats(allRows.length);
            showToast("Record deleted", "success");
        }

        function applySearch() {
            const query = document.getElementById("searchBar").value.trim().toLowerCase();
            if (!query) {
                renderTable(allRows);
                return;
            }
            const filtered = allRows.filter((r) =>
                (r.name || "").toLowerCase().includes(query)
                || (r.aadhaar || "").toLowerCase().includes(query)
                || (r.bankAccount || "").toLowerCase().includes(query)
            );
            renderTable(filtered);
        }

        function escapeHtml(str) {
            return String(str)
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/\"/g, "&quot;")
                .replace(/'/g, "&#39;");
        }

        function maskSensitiveData(data) {
            if (!data) return data;
            if (data.length <= 4) return data;
            return "*".repeat(data.length - 4) + data.slice(-4);
        }

        function autoFillIdentityFields(source) {
            const usernameInput = document.getElementById("requestUsername");
            const emailInput = document.getElementById("requestEmail");
            const hint = document.getElementById("requestHint");

            if (!usernameInput || !emailInput || !hint) {
                return;
            }

            const usernameValue = usernameInput.value.trim().toLowerCase();
            const emailValue = emailInput.value.trim().toLowerCase();

            if (source === "username" && usernameValue) {
                const matched = adminUsersCache.find((u) => (u.username || "").toLowerCase() === usernameValue);
                if (matched) {
                    emailInput.value = matched.email || "";
                    hint.textContent = `Matched user: ${matched.name}`;
                    return;
                }
            }

            if (source === "email" && emailValue) {
                const matched = adminUsersCache.find((u) => (u.email || "").toLowerCase() === emailValue);
                if (matched) {
                    usernameInput.value = matched.username || "";
                    hint.textContent = `Matched user: ${matched.name}`;
                    return;
                }
            }

            hint.textContent = "Enter exact username and email for strict verification.";
        }

        function bindAdminRequestAutoFill() {
            const usernameInput = document.getElementById("requestUsername");
            const emailInput = document.getElementById("requestEmail");

            if (!usernameInput || !emailInput) {
                return;
            }

            usernameInput.addEventListener("input", () => autoFillIdentityFields("username"));
            emailInput.addEventListener("input", () => autoFillIdentityFields("email"));
        }

        function promptAddData() {
            const docName = window.prompt("Enter document name (Aadhaar, Bank Account, PAN, etc.)");
            if (!docName || !docName.trim()) {
                return;
            }

            const docNumber = window.prompt(`Enter ${docName} number`);
            if (!docNumber || !docNumber.trim()) {
                return;
            }

            saveDataToBackend(docName.trim(), docNumber.trim());
        }

        async function saveDataToBackend(docName, docNumber) {
            try {
                const response = await fetch(`${API_BASE}/customers/add`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        userId: userId,
                        docName: docName,
                        docNumber: docNumber
                    })
                });
                const data = await response.json();

                if (!response.ok || data.status !== "success") {
                    showToast(data.message || "Failed to save data", "error");
                    return;
                }

                showToast("Data saved successfully", "success");
                loadTableData();
            } catch (err) {
                showToast("Backend unavailable", "error");
            }
        }

        async function loadTableData() {
            showSkeleton();
            try {
                const url = role === "ADMIN"
                    ? `${API_BASE}/customers?role=ADMIN&adminId=${encodeURIComponent(adminId || "")}`
                    : `${API_BASE}/customers?role=USER&userId=${encodeURIComponent(userId || "")}`;
                
                console.log("Loading data from:", url);
                
                const response = await fetch(url);
                console.log("Response status:", response.status);
                
                if (!response.ok) {
                    const errorData = await response.text();
                    console.error("API Error Response:", errorData);
                    throw new Error(`HTTP ${response.status}: ${errorData}`);
                }
                
                allRows = await response.json();
                console.log("Data loaded successfully:", allRows);
                
                hideSkeleton();
                renderTable(allRows);
                renderStats(allRows.length);
            } catch (err) {
                console.error("Error loading records:", err);
                allRows = [];
                hideSkeleton();
                renderTable(allRows);
                renderStats(allRows.length);
                showToast("Could not load records: " + err.message, "error");
            }
        }

        async function loadUserRequests() {
            const panel = document.getElementById("requestPanel");
            panel.style.display = "block";
            panel.innerHTML = "<h3 style='font-family:Syne,sans-serif;font-size:20px;margin-bottom:10px;'>Pending Admin Requests</h3><div style='color:var(--text-muted);'>Loading requests...</div>";

            try {
                const response = await fetch(`${API_BASE}/customers/requests?userId=${encodeURIComponent(userId || "")}`);
                if (!response.ok) {
                    throw new Error("Could not load requests");
                }
                const requests = await response.json();
                if (!requests.length) {
                    panel.innerHTML = "<h3 style='font-family:Syne,sans-serif;font-size:20px;margin-bottom:10px;'>Pending Admin Requests</h3><div style='color:var(--text-muted);'>No pending requests.</div>";
                    return;
                }

                panel.innerHTML = `
                    <h3 style="font-family:Syne,sans-serif;font-size:20px;margin-bottom:10px;">Pending Admin Requests</h3>
                    <div class="req-list">
                        ${requests.map((req) => `
                            <div class="req-item">
                                <div>
                                    <div style="font-weight:700;">${escapeHtml(req.companyName)}</div>
                                    <div style="font-size:12px;color:var(--text-muted);">${escapeHtml(req.companyEmail)}</div>
                                </div>
                                <div>
                                    <button class="mini accept" onclick="respondRequest(${req.requestId}, 'ACCEPT')">Accept</button>
                                    <button class="mini reject" onclick="respondRequest(${req.requestId}, 'REJECT')">Reject</button>
                                </div>
                            </div>
                        `).join("")}
                    </div>
                `;
            } catch (err) {
                panel.innerHTML = "<h3 style='font-family:Syne,sans-serif;font-size:20px;margin-bottom:10px;'>Pending Admin Requests</h3><div style='color:var(--text-muted);'>Request inbox unavailable.</div>";
            }
        }

        async function respondRequest(requestId, action) {
            try {
                const response = await fetch(`${API_BASE}/customers/requests/${requestId}/respond`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ userId, action })
                });
                const data = await response.json();
                if (!response.ok || data.status !== "success") {
                    showToast(data.message || "Action failed", "error");
                    return;
                }
                showToast(action === "ACCEPT" ? "Access granted to admin" : "Request rejected", "success");
                loadUserRequests();
            } catch (err) {
                showToast("Request failed", "error");
            }
        }

        async function loadAdminRequestPanel() {
            const panel = document.getElementById("requestPanel");
            panel.style.display = "block";
            panel.innerHTML = "<h3 style='font-family:Syne,sans-serif;font-size:20px;margin-bottom:10px;'>Send Access Request</h3><div style='color:var(--text-muted);'>Loading users...</div>";
            try {
                const response = await fetch(`${API_BASE}/customers/users-basic?adminId=${encodeURIComponent(adminId || "")}`);
                if (!response.ok) {
                    throw new Error("Could not fetch users");
                }
                const users = await response.json();
                adminUsersCache = users;
                panel.innerHTML = `
                    <h3 style="font-family:Syne,sans-serif;font-size:20px;margin-bottom:10px;">Send Access Request</h3>
                    <div class="request-form">
                        <div class="request-grid">
                            <input id="requestUsername" class="request-input" type="text" list="requestUsernameList" placeholder="Target username (required)">
                            <input id="requestEmail" class="request-input" type="email" placeholder="Target email (required)">
                            <button class="mini" onclick="sendAdminRequestByIdentity()">Send</button>
                        </div>
                        <datalist id="requestUsernameList">
                            ${users.map((u) => `<option value="${escapeHtml(u.username || "")}"></option>`).join("")}
                        </datalist>
                        <div class="request-caption" id="requestHint">Strict mode: both username and email must match the same user.</div>
                    </div>
                    <div class="req-list">
                        ${users.map((u) => `
                            <div class="req-item">
                                <div>
                                    <div style="font-weight:700;">${escapeHtml(u.name)}</div>
                                    <div style="font-size:12px;color:var(--text-muted);">@${escapeHtml(u.username)} | ${escapeHtml(u.email || "")}</div>
                                    <div style="font-size:12px;color:var(--text-muted);">Status: ${escapeHtml(u.requestStatus)}</div>
                                </div>
                                <button class="mini" onclick="sendAdminRequest('${encodeURIComponent(u.username || "")}', '${encodeURIComponent(u.email || "")}')">Request Access</button>
                            </div>
                        `).join("")}
                    </div>
                `;
                bindAdminRequestAutoFill();
            } catch (err) {
                panel.innerHTML = "<h3 style='font-family:Syne,sans-serif;font-size:20px;margin-bottom:10px;'>Send Access Request</h3><div style='color:var(--text-muted);'>Could not load user list.</div>";
            }
        }

        async function sendAdminRequest(encodedUsername, encodedEmail) {
            const usernameValue = decodeURIComponent(encodedUsername || "").trim();
            const emailValue = decodeURIComponent(encodedEmail || "").trim();

            if (!usernameValue || !emailValue) {
                showToast("Username and email are required", "error");
                return;
            }

            try {
                const response = await fetch(`${API_BASE}/customers/access-request`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        adminId: Number(adminId),
                        username: usernameValue,
                        email: emailValue
                    })
                });
                const data = await response.json();
                if (!response.ok || data.status !== "success") {
                    showToast(data.message || "Could not send request", "error");
                    return;
                }
                showToast("Access request sent", "success");
                loadAdminRequestPanel();
            } catch (err) {
                showToast("Request API unavailable", "error");
            }
        }

        async function sendAdminRequestByIdentity() {
            const usernameValue = document.getElementById("requestUsername")?.value?.trim() || "";
            const emailValue = document.getElementById("requestEmail")?.value?.trim() || "";

            if (!usernameValue || !emailValue) {
                showToast("Enter both username and email", "error");
                return;
            }

            try {
                const response = await fetch(`${API_BASE}/customers/access-request`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        adminId: Number(adminId),
                        username: usernameValue,
                        email: emailValue
                    })
                });
                const data = await response.json();
                if (!response.ok || data.status !== "success") {
                    showToast(data.message || "Could not send request", "error");
                    return;
                }
                showToast("Access request sent", "success");
                loadAdminRequestPanel();
            } catch (err) {
                showToast("Request API unavailable", "error");
            }
        }

        function setupRoleView() {
            const tableTitle = document.getElementById("tableTitle");
            const modeMessage = document.getElementById("modeMessage");
            const addDataBtn = document.getElementById("addDataBtn");
            const tableHead = document.getElementById("tableHead");

            // Update table headers based on role
            if (role === "ADMIN") {
                tableHead.innerHTML = `
                    <tr>
                        <th>S.No</th>
                        <th>User</th>
                        <th>Document</th>
                        <th>Number</th>
                        <th>Action</th>
                    </tr>
                `;
                tableTitle.textContent = "Accepted User Records - Masked View";
                modeMessage.textContent = "Sensitive fields are masked per data protection policy";
                addDataBtn.style.display = "none";
                loadAdminRequestPanel();
            } else {
                tableHead.innerHTML = `
                    <tr>
                        <th>S.No</th>
                        <th>Document</th>
                        <th>Number</th>
                        <th>Action</th>
                    </tr>
                `;
                tableTitle.textContent = "Your Personal Data";
                modeMessage.textContent = "You are viewing your own secured data";
                addDataBtn.style.display = "inline-block";
                loadUserRequests();
            }
        }

        function refreshDashboard() {
            loadTableData();
            if (role === "ADMIN") {
                loadAdminRequestPanel();
            } else {
                loadUserRequests();
            }
        }

        document.getElementById("searchBar").addEventListener("input", applySearch);

        setHeader();
        setupRoleView();
        loadTableData();
    </script>
</body>
</html>
