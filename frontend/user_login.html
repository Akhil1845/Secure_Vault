<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SecureVault — Data Protection System</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="user_login.css">
</head>
<body>

<!-- ── BACKGROUND ── -->
<div class="bg-layer">
  <div class="orb1"></div>
  <div class="orb2"></div>
  <div class="orb3"></div>
  <div class="scan-line"></div>
  <div class="particles" id="particles"></div>
</div>

<!-- ── TOAST ── -->
<div class="toast" id="toast">
  <span id="toast-icon">✓</span>
  <span id="toast-msg"></span>
</div>

<!-- ── MAIN ── -->
<div class="main">

  <!-- Brand -->
  <div class="brand">
    <div class="brand-icon">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 4a3 3 0 110 6 3 3 0 010-6zm0 13c-2.67 0-5.01-1.43-6.34-3.57.03-2.1 4.24-3.25 6.34-3.25s6.31 1.15 6.34 3.25C17.01 16.57 14.67 18 12 18z"/>
      </svg>
    </div>
    <div class="brand-name">SecureVault</div>
    <div class="brand-tagline">Data Masking & Access Control System</div>
  </div>

  <!-- Card -->
  <div class="card">

    <!-- Tabs -->
    <div class="tabs">
      <div class="tab active" onclick="switchTab('login')">Sign In</div>
      <div class="tab" onclick="switchTab('signup')">Register</div>
    </div>

    <!-- ─── LOGIN PANEL ─── -->
    <div class="panel active" id="panel-login">



      <!-- Username -->
      <div class="field">
        <div class="field-label">Username</div>
        <div class="input-wrap">
          <input type="text" id="login-user" placeholder="Enter your username" autocomplete="username">
          <span class="input-icon">◈</span>
        </div>
      </div>

      <!-- Password -->
      <div class="field">
        <div class="field-label">
          Password
          <span class="forgot" onclick="forgotPw()">Forgot password?</span>
        </div>
        <div class="input-wrap">
          <input type="password" id="login-pw" placeholder="Enter your password" autocomplete="current-password">
          <span class="input-icon">🔒</span>
          <span class="toggle-pw" onclick="togglePw('login-pw',this)">👁</span>
        </div>
      </div>

      <!-- Remember -->
      <label class="checkbox-row">
        <input type="checkbox" checked>
        Keep me signed in for this session
      </label>

      <button class="btn-submit" onclick="doLogin()">
        <span class="btn-text">🔐 &nbsp; Authenticate</span>
        <div class="spinner"></div>
      </button>

      <div class="divider"><span>or continue with</span></div>

      <button class="btn-google" onclick="doGoogleAuth('login')">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        Continue with Google
      </button>

    </div>

    <!-- ─── SIGNUP PANEL ─── -->
    <div class="panel" id="panel-signup">



      <!-- Full Name -->
      <div class="field">
        <div class="field-label">Full Name</div>
        <div class="input-wrap">
          <input type="text" id="signup-name" placeholder="Enter your full name">
          <span class="input-icon">◈</span>
        </div>
      </div>

      <!-- Email -->
      <div class="field">
        <div class="field-label">Email Address</div>
        <div class="input-wrap">
          <input type="email" id="signup-email" placeholder="you@organisation.com">
          <span class="input-icon">@</span>
        </div>
      </div>

      <!-- Password -->
      <div class="field">
        <div class="field-label">
          Password
          <span class="hint">Min 8 chars, A-Z, a-z, 0-9</span>
        </div>
        <div class="input-wrap">
          <input type="password" id="signup-pw" placeholder="Create a strong password" oninput="checkStrength(this.value)" autocomplete="new-password">
          <span class="input-icon">🔒</span>
          <span class="toggle-pw" onclick="togglePw('signup-pw',this)">👁</span>
        </div>
        <div class="strength-bar" id="strength-bar">
          <div class="strength-seg" id="s1"></div>
          <div class="strength-seg" id="s2"></div>
          <div class="strength-seg" id="s3"></div>
          <div class="strength-seg" id="s4"></div>
        </div>
        <div class="strength-text" id="strength-text">Enter a password</div>
      </div>

      <!-- Confirm Password -->
      <div class="field">
        <div class="field-label">Confirm Password</div>
        <div class="input-wrap">
          <input type="password" id="signup-confirm" placeholder="Re-enter your password" autocomplete="new-password">
          <span class="input-icon">🔒</span>
          <span class="toggle-pw" onclick="togglePw('signup-confirm',this)">👁</span>
        </div>
      </div>

      <!-- Terms -->
      <label class="checkbox-row">
        <input type="checkbox" id="terms-check">
        I agree to the <a href="#">Privacy Policy</a> and <a href="#">Terms of Service</a>
      </label>

      <button class="btn-submit" onclick="doSignup()">
        <span class="btn-text">🛡️ &nbsp; Create Secure Account</span>
        <div class="spinner"></div>
      </button>

      <div class="divider"><span>or continue with</span></div>

      <button class="btn-google" onclick="doGoogleAuth('signup')">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        Sign up with Google
      </button>

    </div>

  </div><!-- /card -->

  <!-- Security badges -->
  <div class="security-badges">
    <div class="badge"><div class="badge-dot"></div>256-bit Encrypted</div>
    <div class="badge"><div class="badge-dot"></div>RBAC Enabled</div>
    <div class="badge"><div class="badge-dot"></div>Audit Logged</div>
  </div>

</div><!-- /main -->

<script>
  // ─── PARTICLES ───
  const container = document.getElementById('particles');
  for (let i = 0; i < 30; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.cssText = `
      left: ${Math.random()*100}%;
      top: ${Math.random()*100}%;
      --dur: ${3+Math.random()*5}s;
      --delay: ${Math.random()*6}s;
      width: ${Math.random()>0.7?3:2}px;
      height: ${Math.random()>0.7?3:2}px;
      opacity:0;
    `;
    container.appendChild(p);
  }

  // ─── TAB SWITCHING ───
  function switchTab(tab) {
    document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active', i===(tab==='login'?0:1)));
    document.getElementById('panel-login').classList.toggle('active', tab==='login');
    document.getElementById('panel-signup').classList.toggle('active', tab==='signup');
  }

  // ─── ROLE SELECT (LOGIN) ───
  const roleMessages = {
    user:    ['user-mode',    'User — Masked data view only'],
    auditor: ['auditor-mode', 'Auditor — Audit log access only']
  };
  function selectRole(el, role) {
    el.closest('.role-grid').querySelectorAll('.role-btn').forEach(b=>b.classList.remove('selected'));
    el.classList.add('selected');
    const ind = document.getElementById('access-indicator');
    const txt = document.getElementById('access-text');
    ind.className = 'access-indicator ' + roleMessages[role][0];
    txt.textContent = roleMessages[role][1];
  }

  // ─── ROLE SELECT (SIGNUP) ───
  function selectSignupRole(el) {
    el.closest('.role-grid').querySelectorAll('.role-btn').forEach(b=>b.classList.remove('selected'));
    el.classList.add('selected');
  }

  // ─── TOGGLE PASSWORD ───
  function togglePw(id, btn) {
    const inp = document.getElementById(id);
    if (inp.type === 'password') { inp.type = 'text'; btn.textContent = '🙈'; }
    else { inp.type = 'password'; btn.textContent = '👁'; }
  }

  // ─── PASSWORD STRENGTH ───
  function checkStrength(val) {
    let score = 0;
    if (val.length >= 8) score++;
    if (/[A-Z]/.test(val)) score++;
    if (/[a-z]/.test(val)) score++;
    if (/[0-9]/.test(val)) score++;
    if (/[^A-Za-z0-9]/.test(val)) score = Math.min(score+1,4);

    const segs = [document.getElementById('s1'),document.getElementById('s2'),document.getElementById('s3'),document.getElementById('s4')];
    const labels = ['','Weak','Fair','Strong','Very Strong'];
    const classes = ['','w','m','s','s'];
    segs.forEach((s,i)=>{
      s.className = 'strength-seg';
      if (i < score) s.classList.add(classes[score]);
    });
    document.getElementById('strength-text').textContent = val.length ? labels[score]||'Very Strong' : 'Enter a password';
  }

  // ─── TOAST ───
  function showToast(msg, type='success') {
    const t = document.getElementById('toast');
    document.getElementById('toast-msg').textContent = msg;
    document.getElementById('toast-icon').textContent = type==='success'?'✓':'✕';
    t.className = 'toast ' + type;
    t.classList.add('show');
    setTimeout(()=>t.classList.remove('show'), 3500);
  }

  // ─── SIMULATE LOAD ───
  function withLoading(btn, fn) {
    btn.classList.add('loading');
    setTimeout(()=>{ btn.classList.remove('loading'); fn(); }, 1800);
  }

  // ─── LOGIN ───
  function doLogin() {
    const user = document.getElementById('login-user').value.trim();
    const pw = document.getElementById('login-pw').value;
    if (!user || !pw) { showToast('Please fill in all fields', 'error'); return; }

    const btn = document.querySelector('#panel-login .btn-submit');
    btn.classList.add('loading');
    
    fetch('http://localhost:8083/auth/login', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/x-www-form-urlencoded'
      },
      body: new URLSearchParams({ username: user, password: pw })
    })
    .then(response => response.text())
    .then(data => {
      btn.classList.remove('loading');
      if (data.startsWith('Success:')) {
        const role = data.split(': ')[1];
        showToast('Access granted — Role: ' + role, 'success');
        // Save role for future API requests
        localStorage.setItem('user_role', role);
      } else {
        showToast(data, 'error');
      }
    })
    .catch(err => {
      btn.classList.remove('loading');
      showToast('Connection to server failed', 'error');
      console.error(err);
    });
  }

  // ─── SIGNUP ───
  function doSignup() {
    const name  = document.getElementById('signup-name').value.trim();
    const email = document.getElementById('signup-email').value.trim();
    const pw    = document.getElementById('signup-pw').value;
    const conf  = document.getElementById('signup-confirm').value;
    const terms = document.getElementById('terms-check').checked;

    if (!name||!email||!pw||!conf) { showToast('Please fill in all fields', 'error'); return; }
    if (pw !== conf) { showToast('Passwords do not match', 'error'); return; }
    if (!terms) { showToast('Please accept the terms', 'error'); return; }
    if (pw.length < 8) { showToast('Password must be at least 8 characters', 'error'); return; }
    if (!/[A-Z]/.test(pw) || !/[a-z]/.test(pw)) { showToast('Password must include uppercase and lowercase', 'error'); return; }

    const btn = document.querySelector('#panel-signup .btn-submit');
    withLoading(btn, () => {
      showToast(`Account created! Welcome, ${name.split(' ')[0]}`, 'success');
      setTimeout(()=>switchTab('login'), 1000);
    });
  }

  // ─── GOOGLE AUTH ───
  function doGoogleAuth(mode) {
    showToast(mode === 'login' ? 'Redirecting to Google Sign In...' : 'Redirecting to Google Sign Up...', 'success');
    // Integrate with Google OAuth here: window.location.href = '/auth/google';
  }

  // ─── FORGOT PW ───
  function forgotPw() {
    showToast('Password reset link sent to your email', 'success');
  }
</script>
</body>
</html>
