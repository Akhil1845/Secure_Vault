<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SecureVault — Data Protection System</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<link rel="stylesheet" href="user_login.css">
<script src="config.js"></script>
</head>
<body>

<!-- ── BACKGROUND ── -->
<div class="bg-layer">
  <div class="orb1"></div>
  <div class="orb2"></div>
  <div class="orb3"></div>
  <div class="scan-line"></div>
  <div class="particles" id="particles"></div>
</div>

<!-- ── TOAST ── -->
<div class="toast" id="toast">
  <span id="toast-icon">✓</span>
  <span id="toast-msg"></span>
</div>

<!-- ── MAIN ── -->
<div class="main">

  <!-- Brand -->
  <div class="brand">
    <div class="brand-icon">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 4a3 3 0 110 6 3 3 0 010-6zm0 13c-2.67 0-5.01-1.43-6.34-3.57.03-2.1 4.24-3.25 6.34-3.25s6.31 1.15 6.34 3.25C17.01 16.57 14.67 18 12 18z"/>
      </svg>
    </div>
    <div class="brand-name">SecureVault</div>
    <div class="brand-tagline">Data Masking &amp; Access Control System</div>
  </div>

  <!-- Card -->
  <div class="card">

    <!-- Tabs -->
    <div class="tabs">
      <div class="tab active" onclick="switchTab('login')">Sign In</div>
      <div class="tab" onclick="switchTab('signup')">Register</div>
    </div>

    <!-- ─── LOGIN PANEL ─── -->
    <div class="panel active" id="panel-login">

      <!-- Username / Email -->
      <div class="field">
        <div class="field-label">Username or Email</div>
        <div class="input-wrap">
          <input type="text" id="login-user" placeholder="Enter your username or email" autocomplete="username">
          <span class="input-icon">◈</span>
        </div>
      </div>

      <!-- Password -->
      <div class="field">
        <div class="field-label">
          Password
          <span class="forgot" onclick="forgotPw()">Forgot password?</span>
        </div>
        <div class="input-wrap">
          <input type="password" id="login-pw" placeholder="Enter your password" autocomplete="current-password">
          <span class="input-icon">🔒</span>
          <span class="toggle-pw" onclick="togglePw('login-pw',this)">👁</span>
        </div>
      </div>

      <!-- Remember -->
      <label class="checkbox-row">
        <input type="checkbox" checked>
        Keep me signed in for this session
      </label>

      <button class="btn-submit" onclick="doLogin()">
        <span class="btn-text">🔐 &nbsp; Authenticate</span>
        <div class="spinner"></div>
      </button>

    </div>

    <!-- ─── SIGNUP PANEL ─── -->
    <div class="panel" id="panel-signup">

      <!-- Full Name -->
      <div class="field">
        <div class="field-label">Full Name</div>
        <div class="input-wrap">
          <input type="text" id="signup-name" placeholder="Enter your full name">
          <span class="input-icon">◈</span>
        </div>
      </div>

      <!-- Username -->
      <div class="field">
        <div class="field-label">Username</div>
        <div class="input-wrap">
          <input type="text" id="signup-username" placeholder="Choose a username" autocomplete="username">
          <span class="input-icon">◎</span>
        </div>
      </div>

      <!-- Email -->
      <div class="field">
        <div class="field-label">Email Address</div>
        <div class="input-wrap">
          <input type="email" id="signup-email" placeholder="you@organisation.com">
          <span class="input-icon">@</span>
        </div>
      </div>

      <!-- Password -->
      <div class="field">
        <div class="field-label">
          Password
          <span class="hint">Min 8 chars, A-Z, a-z, 0-9</span>
        </div>
        <div class="input-wrap">
          <input type="password" id="signup-pw" placeholder="Create a strong password" oninput="checkStrength(this.value)" autocomplete="new-password">
          <span class="input-icon">🔒</span>
          <span class="toggle-pw" onclick="togglePw('signup-pw',this)">👁</span>
        </div>
        <div class="strength-bar" id="strength-bar">
          <div class="strength-seg" id="s1"></div>
          <div class="strength-seg" id="s2"></div>
          <div class="strength-seg" id="s3"></div>
          <div class="strength-seg" id="s4"></div>
        </div>
        <div class="strength-text" id="strength-text">Enter a password</div>
      </div>

      <!-- Confirm Password -->
      <div class="field">
        <div class="field-label">Confirm Password</div>
        <div class="input-wrap">
          <input type="password" id="signup-confirm" placeholder="Re-enter your password" autocomplete="new-password">
          <span class="input-icon">🔒</span>
          <span class="toggle-pw" onclick="togglePw('signup-confirm',this)">👁</span>
        </div>
      </div>

      <!-- Terms -->
      <label class="checkbox-row">
        <input type="checkbox" id="terms-check">
        I agree to the <a href="#">Privacy Policy</a> and <a href="#">Terms of Service</a>
      </label>

      <button class="btn-submit" onclick="doSignup()">
        <span class="btn-text">🛡️ &nbsp; Create Secure Account</span>
        <div class="spinner"></div>
      </button>

    </div>

  </div><!-- /card -->

  <!-- Security badges -->
  <div class="security-badges">
    <div class="badge"><div class="badge-dot"></div>256-bit Encrypted</div>
    <div class="badge"><div class="badge-dot"></div>RBAC Enabled</div>
    <div class="badge"><div class="badge-dot"></div>Audit Logged</div>
  </div>

</div><!-- /main -->

<script>
  // ─── PARTICLES ───
  const container = document.getElementById('particles');
  for (let i = 0; i < 30; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.cssText = `
      left: ${Math.random()*100}%;
      top: ${Math.random()*100}%;
      --dur: ${3+Math.random()*5}s;
      --delay: ${Math.random()*6}s;
      width: ${Math.random()>0.7?3:2}px;
      height: ${Math.random()>0.7?3:2}px;
      opacity:0;
    `;
    container.appendChild(p);
  }

  // ─── TAB SWITCHING ───
  function switchTab(tab) {
    document.querySelectorAll('.tab').forEach((t,i) =>
      t.classList.toggle('active', i === (tab === 'login' ? 0 : 1))
    );
    document.getElementById('panel-login').classList.toggle('active', tab === 'login');
    document.getElementById('panel-signup').classList.toggle('active', tab === 'signup');
  }

  // ─── ROLE SELECT (LOGIN) ───
  const roleMessages = {
    user:    ['user-mode',    'User — Masked data view only'],
    auditor: ['auditor-mode', 'Auditor — Audit log access only']
  };
  function selectRole(el, role) {
    el.closest('.role-grid').querySelectorAll('.role-btn').forEach(b => b.classList.remove('selected'));
    el.classList.add('selected');
    const ind = document.getElementById('access-indicator');
    const txt = document.getElementById('access-text');
    ind.className = 'access-indicator ' + roleMessages[role][0];
    txt.textContent = roleMessages[role][1];
  }

  // ─── ROLE SELECT (SIGNUP) ───
  function selectSignupRole(el) {
    el.closest('.role-grid').querySelectorAll('.role-btn').forEach(b => b.classList.remove('selected'));
    el.classList.add('selected');
  }

  // ─── TOGGLE PASSWORD ───
  function togglePw(id, btn) {
    const inp = document.getElementById(id);
    if (inp.type === 'password') { inp.type = 'text'; btn.textContent = '🙈'; }
    else { inp.type = 'password'; btn.textContent = '👁'; }
  }

  // ─── PASSWORD STRENGTH ───
  function checkStrength(val) {
    let score = 0;
    if (val.length >= 8) score++;
    if (/[A-Z]/.test(val)) score++;
    if (/[a-z]/.test(val)) score++;
    if (/[0-9]/.test(val)) score++;
    if (/[^A-Za-z0-9]/.test(val)) score = Math.min(score + 1, 4);

    const segs = ['s1','s2','s3','s4'].map(id => document.getElementById(id));
    const labels  = ['', 'Weak', 'Fair', 'Strong', 'Very Strong'];
    const classes = ['', 'w', 'm', 's', 's'];

    segs.forEach((s, i) => {
      s.className = 'strength-seg';
      if (i < score) s.classList.add(classes[score]);
    });
    document.getElementById('strength-text').textContent =
      val.length ? (labels[score] || 'Very Strong') : 'Enter a password';
  }

  // ─── TOAST ───
  function showToast(msg, type = 'success') {
    const t = document.getElementById('toast');
    document.getElementById('toast-msg').textContent = msg;
    document.getElementById('toast-icon').textContent = type === 'success' ? '✓' : '✕';
    t.className = 'toast ' + type;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3500);
  }

  // ─── LOGIN ───
  function doLogin() {
    const identifier = document.getElementById('login-user').value.trim();

    // Admin username shortcut via login form
    if (identifier.toLowerCase() === 'admin') {
      showToast('Opening admin portal', 'success');
      setTimeout(() => window.location.assign('admin-portal.html'), 250);
      return;
    }

    const pw = document.getElementById('login-pw').value;
    if (!identifier || !pw) { showToast('Please fill in all fields', 'error'); return; }

    const btn = document.querySelector('#panel-login .btn-submit');
    btn.classList.add('loading');

    fetch(API_BASE + '/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: new URLSearchParams({ username: identifier, password: pw })
    })
    .then(response => response.json())
    .then(data => {
      btn.classList.remove('loading');
      if (data.status === 'success') {
        const role = data.role;
        showToast('Access granted — Role: ' + role, 'success');
        localStorage.setItem('username', data.username || identifier);
        localStorage.setItem('role', role || 'USER');
        localStorage.setItem('user_role', role || 'USER');
        if (data.userId) localStorage.setItem('userId', String(data.userId));
        localStorage.removeItem('adminId');
        localStorage.removeItem('companyName');
        setTimeout(() => { window.location.href = 'dashboard.html'; }, 500);
      } else {
        showToast(data.message || 'Invalid username or password', 'error');
      }
    })
    .catch(err => {
      btn.classList.remove('loading');
      showToast('Connection to server failed', 'error');
      console.error(err);
    });
  }

  // ─── SIGNUP ───
  function doSignup() {
    const name     = document.getElementById('signup-name').value.trim();
    const username = document.getElementById('signup-username').value.trim();
    const email    = document.getElementById('signup-email').value.trim();
    const pw       = document.getElementById('signup-pw').value;
    const conf     = document.getElementById('signup-confirm').value;
    const terms    = document.getElementById('terms-check').checked;

    if (!name || !username || !email || !pw || !conf) { showToast('Please fill in all fields', 'error'); return; }
    if (username.length < 3)                           { showToast('Username must be at least 3 characters', 'error'); return; }
    if (pw !== conf)                                   { showToast('Passwords do not match', 'error'); return; }
    if (!terms)                                        { showToast('Please accept the terms', 'error'); return; }
    if (pw.length < 8)                                 { showToast('Password must be at least 8 characters', 'error'); return; }
    if (!/[A-Z]/.test(pw) || !/[a-z]/.test(pw))       { showToast('Password must include uppercase and lowercase', 'error'); return; }

    const btn = document.querySelector('#panel-signup .btn-submit');
    const selectedRoleBtn = document.querySelector('#panel-signup .role-btn.selected');
    const role = selectedRoleBtn
      ? (selectedRoleBtn.textContent.includes('Admin') ? 'ADMIN'
        : selectedRoleBtn.textContent.includes('User') ? 'USER' : 'AUDITOR')
      : 'USER';

    btn.classList.add('loading');
    fetch(API_BASE + '/auth/register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: new URLSearchParams({ username, email, password: pw, role })
    })
    .then(response => response.json())
    .then(data => {
      btn.classList.remove('loading');
      if (data.status === 'success') {
        showToast('Account created! Welcome, ' + name.split(' ')[0], 'success');
        setTimeout(() => switchTab('login'), 1000);
      } else {
        showToast(data.message || 'Registration failed', 'error');
      }
    })
    .catch(err => {
      btn.classList.remove('loading');
      showToast('Connection to server failed', 'error');
      console.error(err);
    });
  }

  // ─── FORGOT PASSWORD ───
  function forgotPw() {
    showToast('Password reset link sent to your email', 'success');
  }

  // ─── SECRET ADMIN KEYBOARD SHORTCUT ───
  // Type A → D → M → I → N anywhere on the page (outside input fields)
  // to navigate directly to the admin portal.
  const ADMIN_SHORTCUT = 'ADMIN';
  let adminBuffer = '';

  document.addEventListener('keydown', (e) => {
    // ✅ Do NOT fire when user is typing inside an input or textarea
    const activeTag = document.activeElement.tagName;
    if (activeTag === 'INPUT' || activeTag === 'TEXTAREA') return;

    // Ignore key combos (Ctrl+A, Alt+D, etc.)
    if (e.ctrlKey || e.metaKey || e.altKey) return;

    const key = (e.key || '').toUpperCase();

    // Reset buffer on any non-letter key (Space, Enter, Backspace, digits, etc.)
    if (!/^[A-Z]$/.test(key)) {
      adminBuffer = '';
      return;
    }

    adminBuffer = (adminBuffer + key).slice(-ADMIN_SHORTCUT.length);

    if (adminBuffer === ADMIN_SHORTCUT) {
      adminBuffer = '';
      window.location.assign('admin-portal.html');
    }
  });
</script>
</body>
</html>
