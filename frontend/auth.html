<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SecureVault Auth</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@500;700;800&family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #060a16;
            --surface: rgba(11, 18, 35, 0.74);
            --border: rgba(78, 117, 204, 0.28);
            --accent: #66a2ff;
            --gold: #efb948;
            --danger: #ff6b7c;
            --success: #4dd48a;
            --text: #eaf1ff;
            --text-muted: #97a3bf;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            min-height: 100vh;
            font-family: "DM Sans", sans-serif;
            color: var(--text);
            background: radial-gradient(circle at 15% 20%, #132447 0%, transparent 35%),
                radial-gradient(circle at 82% 78%, rgba(32, 58, 103, 0.55) 0%, transparent 35%),
                var(--bg);
            overflow-x: hidden;
        }

        .bg-grid,
        .scan-line,
        .particles,
        .orbs {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
        }

        .bg-grid {
            background-image: linear-gradient(rgba(101, 143, 255, 0.08) 1px, transparent 1px),
                linear-gradient(90deg, rgba(101, 143, 255, 0.08) 1px, transparent 1px);
            background-size: 48px 48px;
            mask-image: radial-gradient(circle at center, black 25%, transparent 78%);
        }

        .orbs::before,
        .orbs::after {
            content: "";
            position: absolute;
            border-radius: 50%;
            filter: blur(4px);
            animation: drift 14s ease-in-out infinite;
        }

        .orbs::before {
            width: 340px;
            height: 340px;
            top: -90px;
            left: -70px;
            background: radial-gradient(circle, rgba(87, 140, 255, 0.24), transparent 70%);
        }

        .orbs::after {
            width: 440px;
            height: 440px;
            right: -150px;
            bottom: -160px;
            animation-delay: 3s;
            background: radial-gradient(circle, rgba(239, 185, 72, 0.12), transparent 70%);
        }

        .scan-line {
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(136, 176, 255, 0.65), transparent);
            animation: scan 7s linear infinite;
        }

        @keyframes scan {
            0% { transform: translateY(-2vh); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(102vh); opacity: 0; }
        }

        @keyframes drift {
            0%,100% { transform: translateY(0) translateX(0); }
            50% { transform: translateY(24px) translateX(14px); }
        }

        .particle {
            position: absolute;
            width: 2px;
            height: 2px;
            border-radius: 50%;
            background: rgba(126, 170, 255, 0.9);
            animation: floatUp var(--dur) linear infinite;
            animation-delay: var(--delay);
            opacity: 0;
        }

        @keyframes floatUp {
            0% { transform: translateY(24px) scale(0.8); opacity: 0; }
            20% { opacity: 0.6; }
            100% { transform: translateY(-80px) scale(1.2); opacity: 0; }
        }

        .layout {
            position: relative;
            z-index: 1;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 28px 14px;
            animation: fadeUp 520ms ease;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(24px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card {
            width: 100%;
            max-width: 530px;
            border: 1px solid var(--border);
            border-radius: 20px;
            background: var(--surface);
            backdrop-filter: blur(12px);
            box-shadow: 0 28px 60px rgba(0, 0, 0, 0.45);
            overflow: hidden;
        }

        .brand {
            padding: 18px 24px 8px;
            border-bottom: 1px solid rgba(121, 151, 233, 0.18);
        }

        .brand h1 {
            font-family: "Syne", sans-serif;
            font-size: 28px;
            letter-spacing: 0.3px;
        }

        .brand p {
            color: var(--text-muted);
            font-size: 13px;
            margin-top: 5px;
        }

        .tabs {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin: 18px 24px 0;
            background: rgba(8, 13, 27, 0.9);
            border: 1px solid rgba(124, 153, 231, 0.22);
            border-radius: 11px;
            padding: 5px;
        }

        .tab {
            background: transparent;
            border: none;
            border-radius: 8px;
            color: var(--text-muted);
            font-weight: 700;
            font-family: "Syne", sans-serif;
            cursor: pointer;
            padding: 10px;
            transition: all 180ms ease;
        }

        .tab.active {
            background: rgba(102, 162, 255, 0.18);
            color: #beddff;
        }

        .panel {
            display: none;
            padding: 20px 24px 24px;
        }

        .panel.active {
            display: block;
        }

        .field {
            margin-bottom: 14px;
        }

        .field label {
            display: block;
            font-size: 12px;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 6px;
            font-family: "DM Mono", monospace;
        }

        .input-wrap {
            position: relative;
        }

        .input-wrap input {
            width: 100%;
            border-radius: 10px;
            border: 1px solid rgba(124, 153, 231, 0.32);
            background: rgba(8, 13, 27, 0.85);
            color: var(--text);
            padding: 12px;
            font-size: 14px;
            outline: none;
            transition: border-color 180ms ease, box-shadow 180ms ease;
        }

        .input-wrap input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(102, 162, 255, 0.2);
        }

        .toggle {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            border: none;
            background: transparent;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 12px;
            font-family: "DM Mono", monospace;
        }

        .row {
            display: flex;
            gap: 10px;
            align-items: center;
            margin: 10px 0 16px;
            color: var(--text-muted);
            font-size: 13px;
        }

        .meter {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 6px;
            margin-top: 8px;
        }

        .meter span {
            display: block;
            height: 4px;
            border-radius: 3px;
            background: rgba(122, 140, 179, 0.35);
        }

        .meter span.on.weak { background: #f36d7d; }
        .meter span.on.fair { background: #f0b750; }
        .meter span.on.strong { background: #4dd48a; }

        .meter-text {
            margin-top: 6px;
            color: var(--text-muted);
            font-size: 12px;
            font-family: "DM Mono", monospace;
        }

        .btn {
            width: 100%;
            border: none;
            border-radius: 11px;
            padding: 12px;
            font-weight: 700;
            letter-spacing: 0.2px;
            cursor: pointer;
            transition: transform 180ms ease, box-shadow 180ms ease;
        }

        .btn:hover {
            transform: translateY(-2px);
        }

        .btn-primary {
            background: linear-gradient(135deg, #5f97ff, #447ff0);
            color: #f7fbff;
            box-shadow: 0 8px 24px rgba(78, 133, 243, 0.35);
            margin-top: 4px;
        }

        .btn-google {
            background: rgba(10, 14, 30, 0.84);
            border: 1px solid rgba(123, 151, 232, 0.34);
            color: #dce8ff;
            margin-top: 10px;
        }

        .toast {
            position: fixed;
            top: 18px;
            right: 18px;
            z-index: 2;
            background: rgba(13, 18, 33, 0.95);
            border: 1px solid rgba(124, 153, 231, 0.35);
            color: var(--text);
            padding: 10px 14px;
            border-radius: 9px;
            font-size: 13px;
            transform: translateX(140%);
            transition: transform 250ms ease;
        }

        .toast.show {
            transform: translateX(0);
        }

        .toast.success { border-color: rgba(77, 212, 138, 0.5); }
        .toast.error { border-color: rgba(255, 107, 124, 0.55); }

        @media (max-width: 560px) {
            .brand h1 { font-size: 24px; }
            .panel { padding: 16px; }
            .tabs { margin: 14px 16px 0; }
        }
    </style>
</head>
<body>
    <div class="bg-grid"></div>
    <div class="orbs"></div>
    <div class="scan-line"></div>
    <div class="particles" id="particles"></div>

    <div class="layout">
        <div class="card">
            <div class="brand">
                <h1>SecureVault</h1>
                <p>Role-based Data Masking System</p>
            </div>

            <div class="tabs">
                <button class="tab active" id="signInTab" onclick="switchTab('signin')">Sign In</button>
                <button class="tab" id="registerTab" onclick="switchTab('register')">Register</button>
            </div>

            <div class="panel active" id="signinPanel">
                <div class="field">
                    <label>Username</label>
                    <div class="input-wrap">
                        <input id="loginUsername" type="text" placeholder="Enter your username">
                    </div>
                </div>

                <div class="field">
                    <label>Password</label>
                    <div class="input-wrap">
                        <input id="loginPassword" type="password" placeholder="Enter your password">
                        <button class="toggle" type="button" onclick="toggleMask('loginPassword', this)">SHOW</button>
                    </div>
                </div>

                <div class="row">
                    <input type="checkbox" id="rememberMe">
                    <label for="rememberMe">Remember me</label>
                </div>

                <button class="btn btn-primary" onclick="signInUser()">Sign In Securely</button>
            </div>

            <div class="panel" id="registerPanel">
                <div class="field">
                    <label>Full Name</label>
                    <div class="input-wrap">
                        <input id="regFullName" type="text" placeholder="Enter your full name">
                    </div>
                </div>

                <div class="field">
                    <label>Email</label>
                    <div class="input-wrap">
                        <input id="regEmail" type="email" placeholder="you@example.com">
                    </div>
                </div>

                <div class="field">
                    <label>Username</label>
                    <div class="input-wrap">
                        <input id="regUsername" type="text" placeholder="Choose a username">
                    </div>
                </div>

                <div class="field">
                    <label>Password</label>
                    <div class="input-wrap">
                        <input id="regPassword" type="password" placeholder="Create password" oninput="updateStrength(this.value)">
                        <button class="toggle" type="button" onclick="toggleMask('regPassword', this)">SHOW</button>
                    </div>
                    <div class="meter" id="strengthMeter">
                        <span></span><span></span><span></span><span></span>
                    </div>
                    <div class="meter-text" id="strengthText">Enter a strong password</div>
                </div>

                <div class="field">
                    <label>Confirm Password</label>
                    <div class="input-wrap">
                        <input id="regConfirmPassword" type="password" placeholder="Confirm password">
                        <button class="toggle" type="button" onclick="toggleMask('regConfirmPassword', this)">SHOW</button>
                    </div>
                </div>

                <div class="row">
                    <input type="checkbox" id="termsCheck">
                    <label for="termsCheck">I agree to the terms and privacy policy</label>
                </div>

                <button class="btn btn-primary" onclick="registerUser()">Create Account</button>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        const API_BASE = "http://localhost:8083";

        function makeParticles() {
            const host = document.getElementById("particles");
            for (let i = 0; i < 34; i += 1) {
                const p = document.createElement("div");
                p.className = "particle";
                p.style.left = `${Math.random() * 100}%`;
                p.style.top = `${Math.random() * 100}%`;
                p.style.setProperty("--dur", `${3 + Math.random() * 5}s`);
                p.style.setProperty("--delay", `${Math.random() * 4}s`);
                host.appendChild(p);
            }
        }

        function showToast(message, type) {
            const toast = document.getElementById("toast");
            toast.textContent = message;
            toast.className = `toast ${type || ""} show`;
            setTimeout(() => toast.classList.remove("show"), 2500);
        }

        function switchTab(tab) {
            const signin = tab === "signin";
            document.getElementById("signInTab").classList.toggle("active", signin);
            document.getElementById("registerTab").classList.toggle("active", !signin);
            document.getElementById("signinPanel").classList.toggle("active", signin);
            document.getElementById("registerPanel").classList.toggle("active", !signin);
        }

        function toggleMask(inputId, btn) {
            const input = document.getElementById(inputId);
            const reveal = input.type === "password";
            input.type = reveal ? "text" : "password";
            btn.textContent = reveal ? "HIDE" : "SHOW";
        }

        function updateStrength(password) {
            const meter = Array.from(document.querySelectorAll("#strengthMeter span"));
            const text = document.getElementById("strengthText");
            let score = 0;
            if (password.length >= 8) score += 1;
            if (/[A-Z]/.test(password)) score += 1;
            if (/[a-z]/.test(password)) score += 1;
            if (/\d/.test(password)) score += 1;
            meter.forEach((el, idx) => {
                el.className = "";
                if (idx < score) {
                    if (score <= 1) el.classList.add("on", "weak");
                    else if (score <= 3) el.classList.add("on", "fair");
                    else el.classList.add("on", "strong");
                }
            });
            if (!password) text.textContent = "Enter a strong password";
            else if (score <= 1) text.textContent = "Weak";
            else if (score <= 3) text.textContent = "Fair";
            else text.textContent = "Strong";
        }

        async function signInUser() {
            const username = document.getElementById("loginUsername").value.trim();
            const password = document.getElementById("loginPassword").value.trim();

            // Redirect to admin portal if username is "admin"
            if (username.toLowerCase() === "admin") {
                window.location.href = "admin-portal.html";
                return;
            }

            if (!username || !password) {
                showToast("Enter username and password", "error");
                return;
            }

            try {
                const response = await fetch(`${API_BASE}/auth/login`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ username, password })
                });
                const data = await response.json();

                if (!response.ok || data.status !== "success") {
                    showToast(data.message || "Login failed", "error");
                    return;
                }

                localStorage.setItem("username", data.username || username);
                localStorage.setItem("role", "USER");
                localStorage.setItem("userId", String(data.userId));
                localStorage.removeItem("adminId");
                localStorage.removeItem("companyName");
                window.location.href = "dashboard.html";
            } catch (err) {
                showToast("Backend unavailable. Try again.", "error");
            }
        }

        async function registerUser() {
            const fullName = document.getElementById("regFullName").value.trim();
            const email = document.getElementById("regEmail").value.trim();
            const username = document.getElementById("regUsername").value.trim();
            const password = document.getElementById("regPassword").value;
            const confirmPassword = document.getElementById("regConfirmPassword").value;
            const termsAccepted = document.getElementById("termsCheck").checked;

            if (!fullName || !email || !username || !password || !confirmPassword) {
                showToast("Fill all registration fields", "error");
                return;
            }
            if (password !== confirmPassword) {
                showToast("Passwords do not match", "error");
                return;
            }
            if (!termsAccepted) {
                showToast("Accept terms to continue", "error");
                return;
            }

            try {
                const response = await fetch(`${API_BASE}/auth/register`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ fullName, email, username, password })
                });
                const data = await response.json();
                if (!response.ok || data.status !== "success") {
                    showToast(data.message || "Registration failed", "error");
                    return;
                }

                showToast("Registration successful. Sign in now.", "success");
                switchTab("signin");
            } catch (err) {
                showToast("Backend unavailable. Try again.", "error");
            }
        }

        makeParticles();
    </script>
</body>
</html>
